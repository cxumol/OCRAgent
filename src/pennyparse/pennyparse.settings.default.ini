[aigc.api.chatcomp]
base=https://example.com/v1
authkey=sk-example
model=DeepSeek-VL2-small
model_hasVision=true

[aigc.script]
exe=python3 # python3, python, pypy, bash, powershell, deno, bun, etc.
ext=py # py, sh, ps1, js, etc.

[init.sampling]
by=random # first, random, none
num=3 # >=0

[orchestrator.decision.threshold]
by=LLM # majority, LLM, LLM_proofread
majority_num=2 #return last result when got $majority_num of same results
LLM_num=1 #let LLM* decide/proofread when attempt>$LLM_num

[output]
dir=output
ext=txt
pdf_perpage_threshold=5 # if pdf_pages pdf_pages <= $pdf_perpage_threshold, put extracted text in a single output file

[aigc.prompt]
generate_cli=
